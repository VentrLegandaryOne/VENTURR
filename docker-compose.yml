version: '3.8'

services:
  # Spike7B - Fast local operations microservice
  spike7b:
    build:
      context: ./apps/spike7b
      dockerfile: Dockerfile
    container_name: venturr-spike7b
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - venturr-network

  # PostgreSQL with pgvector extension
  postgres:
    image: pgvector/pgvector:pg16
    container_name: venturr-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=venturr
      - POSTGRES_USER=venturr
      - POSTGRES_PASSWORD=${DB_PASSWORD:-venturr_dev_password}
      - POSTGRES_HOST_AUTH_METHOD=trust
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U venturr"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - venturr-network

  # Redis for caching and event bus
  redis:
    image: redis:7-alpine
    container_name: venturr-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    networks:
      - venturr-network

  # Venturr main application (existing)
  venturr:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: venturr-app
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://venturr:${DB_PASSWORD:-venturr_dev_password}@postgres:5432/venturr
      - REDIS_URL=redis://redis:6379
      - SPIKE_URL=http://spike7b:8000
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - SONAR_API_KEY=${SONAR_API_KEY}
      - OTEL_ENABLED=${OTEL_ENABLED:-false}
      - OTEL_ENDPOINT=${OTEL_ENDPOINT}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      spike7b:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - venturr-network

  # Grafana for monitoring (optional)
  grafana:
    image: grafana/grafana:latest
    container_name: venturr-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=redis-datasource
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./infra/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    networks:
      - venturr-network
    profiles:
      - monitoring

  # Prometheus for metrics (optional)
  prometheus:
    image: prom/prometheus:latest
    container_name: venturr-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: unless-stopped
    networks:
      - venturr-network
    profiles:
      - monitoring

networks:
  venturr-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  grafana-data:
  prometheus-data:

