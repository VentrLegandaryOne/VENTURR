# Ingestion Configuration
ingestion:
  chunk_size: 800  # tokens
  chunk_overlap: 100  # tokens
  embedding_model: "text-embedding-3-small"
  embedding_dimensions: 1536
  batch_size: 100
  max_retries: 3
  retry_delay: 5  # seconds
  
  # Clause-aware chunking
  clause_patterns:
    - pattern: '^\d+\.\d+\.\d+\s+'  # e.g., "3.2.1 "
      type: "clause_id"
    - pattern: '^Section\s+[A-Z]\s+'  # e.g., "Section J "
      type: "section_header"
    - pattern: '^Part\s+\d+\s+'  # e.g., "Part 3 "
      type: "part_header"
  
  # Metadata extraction
  metadata_extractors:
    - type: "clause_id"
      regex: '(\d+\.\d+\.\d+)'
    - type: "product_code"
      regex: '([A-Z0-9-]+(?:-\d+)?(?:-[A-Z]+)?)'
    - type: "standard_reference"
      regex: '(AS[/A-Z0-9\s:.-]+)'
  
  # De-duplication
  deduplication:
    enabled: true
    hash_algorithm: "sha256"
    fields: ["content", "source_uri", "clause_id"]

# Vector Store Configuration
vector_store:
  provider: "pgvector"
  connection_string: "${DATABASE_URL}"
  collections:
    codes_hb39:
      dimensions: 1536
      index_type: "ivfflat"
      lists: 100
    codes_ncc:
      dimensions: 1536
      index_type: "ivfflat"
      lists: 100
    codes_safework:
      dimensions: 1536
      index_type: "ivfflat"
      lists: 50
    supplier_manuals:
      dimensions: 1536
      index_type: "ivfflat"
      lists: 200
    venturr_ops:
      dimensions: 1536
      index_type: "ivfflat"
      lists: 50
    thomco_procedures:
      dimensions: 1536
      index_type: "ivfflat"
      lists: 50
    faq:
      dimensions: 1536
      index_type: "ivfflat"
      lists: 50
    prompts:
      dimensions: 1536
      index_type: "ivfflat"
      lists: 20

# Retrieval Configuration
retrieval:
  default_top_k: 5
  max_top_k: 20
  similarity_threshold: 0.7
  rerank_enabled: true
  rerank_top_k: 3
  hybrid_search:
    enabled: true
    vector_weight: 0.7
    keyword_weight: 0.3

